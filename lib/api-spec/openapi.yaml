openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product catalog operations
  - name: subscribers
    description: Newsletter subscribers
  - name: site-content
    description: Editable site content
  - name: reviews
    description: Customer reviews
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
  /subscribers:
    get:
      operationId: listSubscribers
      tags: [subscribers]
      summary: List subscribers
      responses:
        "200":
          description: Subscribers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscriber"
    post:
      operationId: createSubscriber
      tags: [subscribers]
      summary: Subscribe an email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriberInput"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscriber"
  /site-content:
    get:
      operationId: getSiteContent
      tags: [site-content]
      summary: Get editable site content
      responses:
        "200":
          description: Site content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteContent"
    patch:
      operationId: updateSiteContent
      tags: [site-content]
      summary: Update editable site content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteContentInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteContent"
  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List all reviews
      parameters:
        - name: productId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]
    Product:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        price: { type: number }
        oldPrice: { type: number, nullable: true }
        category:
          type: string
          enum: [Casual, Luxury, Streetwear, Formal]
        image: { type: string }
        description: { type: string }
        styleTip: { type: string, nullable: true }
        sizes:
          type: array
          items: { type: string }
        popularity: { type: integer }
        stockCount: { type: integer }
        isNew: { type: boolean }
      required:
        - id
        - name
        - price
        - category
        - image
        - description
        - sizes
        - popularity
        - stockCount
        - isNew
    ProductInput:
      type: object
      properties:
        name: { type: string, minLength: 1 }
        price: { type: number, minimum: 0 }
        oldPrice: { type: number, nullable: true, minimum: 0 }
        category:
          type: string
          enum: [Casual, Luxury, Streetwear, Formal]
        image: { type: string, minLength: 1 }
        description: { type: string }
        styleTip: { type: string, nullable: true }
        sizes:
          type: array
          items: { type: string }
        popularity: { type: integer, minimum: 0, maximum: 100 }
        stockCount: { type: integer, minimum: 0 }
        isNew: { type: boolean }
      required:
        - name
        - price
        - category
        - image
        - description
        - sizes
        - popularity
        - stockCount
        - isNew
    Subscriber:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, email, createdAt]
    SubscriberInput:
      type: object
      properties:
        email: { type: string, format: email }
      required: [email]
    SiteContent:
      type: object
      properties:
        heroHeadline: { type: string }
        heroSubheading: { type: string }
        heroCtaPrimary: { type: string }
        heroCtaSecondary: { type: string }
        whatsappNumber: { type: string }
        contactEmail: { type: string }
        promoBanner: { type: string }
        tagline: { type: string }
      required:
        - heroHeadline
        - heroSubheading
        - heroCtaPrimary
        - heroCtaSecondary
        - whatsappNumber
        - contactEmail
        - promoBanner
        - tagline
    SiteContentInput:
      type: object
      properties:
        heroHeadline: { type: string, minLength: 1 }
        heroSubheading: { type: string, minLength: 1 }
        heroCtaPrimary: { type: string, minLength: 1 }
        heroCtaSecondary: { type: string, minLength: 1 }
        whatsappNumber: { type: string, minLength: 1 }
        contactEmail: { type: string, minLength: 1 }
        promoBanner: { type: string, minLength: 1 }
        tagline: { type: string, minLength: 1 }
      required:
        - heroHeadline
        - heroSubheading
        - heroCtaPrimary
        - heroCtaSecondary
        - whatsappNumber
        - contactEmail
        - promoBanner
        - tagline
    Review:
      type: object
      properties:
        id: { type: integer }
        productId: { type: string }
        author: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, productId, author, rating, text, createdAt]
    ReviewInput:
      type: object
      properties:
        productId: { type: string, minLength: 1 }
        author: { type: string, minLength: 1 }
        rating: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string, minLength: 1 }
      required: [productId, author, rating, text]
